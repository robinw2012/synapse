name: 📰 Édition quotidienne SYNAPSE

on:
  schedule:
    # Cron en UTC. 5h UTC = 7h Paris en été, 6h Paris en hiver.
    # Pour être strictement à 7h Paris toute l'année, ajoutez aussi 6h UTC
    # (décommenter la seconde ligne). L'édition sera alors régénérée deux
    # fois en hiver mais le résultat final sera le même.
    - cron: "0 5 * * *"
    # - cron: "0 6 * * *"
  workflow_dispatch: {} # permet de déclencher manuellement depuis l'onglet Actions

jobs:
  publish:
    name: Génère et publie l'édition
    runs-on: ubuntu-latest
    permissions:
      contents: write # pour que le bot puisse committer
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installation de Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installation des dépendances
        run: npm install --no-audit --no-fund

      - name: Appel de l'agent IA rédacteur
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Décommenter pour passer en Opus (coût ~5x plus élevé, qualité supérieure)
          # MODEL: claude-opus-4-7
        run: node scripts/generate-edition.mjs

      - name: Commit et push de la nouvelle édition
        run: |
          git config user.name "SYNAPSE bot"
          git config user.email "synapse-bot@users.noreply.github.com"
          git add edition.json archives/
          if git diff --cached --quiet; then
            echo "Pas de changement — rien à publier."
          else
            git commit -m "📰 Édition du $(TZ=Europe/Paris date +'%A %-d %B %Y')"
            git push
            echo "✅ Édition publiée et déployée."
          fi
